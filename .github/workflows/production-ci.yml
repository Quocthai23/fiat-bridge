name: Enterprise Fiat-Bridge CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Chạy toàn bộ các bài test hệ thống bằng Golang
  go-tests:
    name: Go Backend Testing (E2E & Chaos)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Run Backend Tests
        # Chạy toàn bộ các file test trong thư mục /tests và /internal
        run: |
          go test -v ./tests/... 
          go test -v ./internal/...

  # JOB 2: Kiểm toán bảo mật Smart Contract bằng Slither
  slither-audit:
    name: Smart Contract Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies in contracts/
        working-directory: ./contracts
        run: npm install

      - name: Run Slither Analyzer
        uses: crytic/slither-action@v0.4.0
        with:
          node-version: 20
          target: 'contracts/'
          # Bỏ qua cảnh báo từ các thư viện chuẩn của OpenZeppelin
          slither-args: '--filter-paths "node_modules"' 

  # JOB 3: Build và Push Docker Image (Chỉ chạy khi 2 Job trên PASS)
  build-and-push:
    name: Build & Push Docker Image
    needs: [go-tests, slither-audit] # Đợi Test và Audit thành công mới chạy
    runs-on: ubuntu-latest
    # Chỉ push image khi merge hoặc push trực tiếp vào nhánh main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Fiat-Bridge Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Gắn 2 tag: một tag 'latest' và một tag theo mã SHA của commit để dễ rollback
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fiat-bridge:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fiat-bridge:${{ github.sha }}
