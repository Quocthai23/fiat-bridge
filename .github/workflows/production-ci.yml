name: Enterprise Fiat-Bridge CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  go-tests:
    name: Go Backend Testing (E2E & Chaos)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Run Backend Tests
        run: |
          go test -v ./tests/... 
          go test -v ./internal/...

  slither-audit:
    name: Smart Contract Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies in contracts/
        working-directory: ./contracts
        run: npm install

      - name: Run Slither Analyzer
        uses: crytic/slither-action@v0.4.0
        with:
          node-version: 22
          target: 'contracts/'
          slither-args: '--filter-paths "node_modules"'

  build-and-push:
    name: Build & Push Docker Image
    needs: [go-tests, slither-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Fiat-Bridge Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fiat-bridge:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fiat-bridge:${{ github.sha }}
