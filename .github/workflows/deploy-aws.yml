name: AWS Deployment (ECR & EKS)

on:
  push:
    branches: [ "main", "release/*" ]

permissions:
  id-token: write # Required for requesting the JWT for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fiat-bridge
  EKS_CLUSTER_NAME: fiat-bridge-eks
  HELM_RELEASE_NAME: fiat-bridge
  HELM_CHART_PATH: ./helm/fiat-bridge

jobs:
  deploy:
    name: Build, Push to ECR, and Deploy to EKS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Prefer OIDC if AWS_ROLE_ARN is available, otherwise fall back to raw access keys
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Set up Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      - name: Deploy to EKS using Helm
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --namespace default \
            --set image.repository=$REGISTRY/$ECR_REPOSITORY \
            --set image.tag=${{ github.sha }} \
            --set secretEnv.dbPassword="${{ secrets.DB_PASSWORD }}" \
            --set secretEnv.awsAccessKeyId="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --set secretEnv.awsSecretAccessKey="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml
