name: GCP Deployment (Artifact Registry & GKE)

on:
  push:
    branches: [ "main", "release/*" ]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: fiat-bridge-repo
  IMAGE_NAME: fiat-bridge
  GKE_CLUSTER: fiat-bridge-gke
  GKE_ZONE: us-central1-a
  HELM_RELEASE_NAME: fiat-bridge
  HELM_CHART_PATH: ./helm/fiat-bridge

jobs:
  deploy:
    name: Build, Push to Artifact Registry, and Deploy to GKE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        env:
          REGISTRY: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG -t $REGISTRY/$IMAGE_NAME:latest .
          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      - name: Deploy to GKE using Helm
        env:
          REGISTRY: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --namespace default \
            --set image.repository=$REGISTRY/$IMAGE_NAME \
            --set image.tag=${{ github.sha }} \
            --set secretEnv.dbPassword="${{ secrets.DB_PASSWORD }}" \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml
