replicaCount: 2

image:
  repository: my-registry/fiat-bridge
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables applied via ConfigMap and Secrets
env:
  dbDsn: "host=postgres.default.svc.cluster.local user=root password=secretpassword dbname=bridge_db port=5432 sslmode=disable"
  rabbitmqUrl: "amqp://guest:guest@rabbitmq.default.svc.cluster.local:5672/"
  contractAddress: "0x0000000000000000000000000000000000000000"
  kmsKeyId: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""
  awsRegion: ""
