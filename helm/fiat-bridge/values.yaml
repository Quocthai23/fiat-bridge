replicaCount: 2

image:
  repository: my-registry/fiat-bridge
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/fiat-bridge-irsa
    # iam.gke.io/gcp-service-account: fiat-bridge-gsa@my-gcp-project.iam.gserviceaccount.com
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: "alb" # e.g. alb (AWS), gce (GCP), nginx
  annotations: {}
    # kubernetes.io/ingress.class: alb
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: fiat-bridge.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Non-sensitive configuration (ConfigMap)
env:
  dbDsn: "host=postgres.default.svc.cluster.local user=root dbname=bridge_db port=5432 sslmode=disable"
  rabbitmqUrl: "amqp://guest:guest@rabbitmq.default.svc.cluster.local:5672/"
  contractAddress: "0x0000000000000000000000000000000000000000"
  awsRegion: "us-east-1"
  kmsKeyId: ""

# Sensitive configuration (Secret)
secretEnv:
  dbPassword: "secretpassword"
  awsAccessKeyId: ""
  awsSecretAccessKey: ""
